services:
  - type: web
    name: wormgpt-bot
    env: python
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: HF_TOKEN
        value: ${HF_TOKEN}
      - key: TELEGRAM_TOKEN
        value: ${TELEGRAM_TOKEN}
      - key: MODEL_API_KEY
        value: ${MODEL_API_KEY}
